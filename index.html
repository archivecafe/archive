<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive Café — Order</title>

<style>

body{
font-family: Georgia, serif;
background:#F5F2EB;
color:#5B3B1C;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#8B1E2D;
font-size:14px;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-size:14px;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ddd;
border-radius:6px;
font-family:inherit;
}

button{
margin-top:25px;
width:100%;
padding:12px;
border:none;
background:#8B1E2D;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#6e1624;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>Archive Café</h1>
<div class="subtitle">Place an Archive Order</div>

<form action="https://formspree.io/f/xwvrqevg" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Phone Number</label>
<input type="text" name="phone" required>

<label>Select Your Brownie</label>
<select name="flavor" required>

<option value="Belgian Chocolate">
Belgian Chocolate — Archive Collection
</option>

<option value="Nutella">
Nutella — Archive Edition
</option>

<option value="Sea Salt Chocolate">
Sea Salt Chocolate — Signature Archive
</option>

<option value="Kinder Pieces">
Kinder Pieces — Special Archive
</option>

<option value="Pistachio">
Pistachio — Limited Archive (+3 AED)
</option>

<option value="Mix">
Mix — Curated Archive (+3 AED)
</option>

</select>

<label>Quantity</label>
<input type="number" name="quantity" min="1" required>

<label>Pickup or Delivery</label>
<select name="method">
<option value="Pickup">Pickup</option>
<option value="Delivery">Delivery</option>
</select>

<label>Notes</label>
<textarea name="notes" rows="3"></textarea>

<button type="submit">Archive My Box</button>

</form>

<div class="footer">
Archive Café • Freshly Archived Desserts
</div>

</div>

</body>
</html>
